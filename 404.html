<style>
  :root{--sunset:#D4692A;--sunset-dark:#A84E1A;--beige:#FDF6EE;--text:#2C1A0E;--muted:#7a6552;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--beige);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}

  p{color:var(--muted);margin:14px 0 26px;max-width:430px;line-height:1.6;}
  .btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  a{text-decoration:none;font-weight:700;border-radius:12px;padding:13px 24px;}
  .primary{background:var(--sunset);color:#fff;}
  .primary:hover{background:var(--sunset-dark);}
  .ghost{border:1px solid var(--sunset);color:var(--sunset-dark);}
  .ghost:hover{background:#FBE7D4;}
</style></head>
