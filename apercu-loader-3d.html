<!doctype html><meta charset="utf-8">
<style>
:root{--muted:#9A7A60;}
body{margin:0;background:#FDF6EE;font-family:Nunito,system-ui,sans-serif;color:#2C1A0E;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:8px;}
h3{font-family:'Playfair Display',serif;font-weight:600;margin:0;}
small{color:#9A7A60;}
.box{position:relative;width:min(90vw,420px);height:320px;background:#FDF6EE;border:1px dashed rgba(212,105,42,.3);border-radius:14px;margin-top:10px;}
button{margin-top:18px;background:#D4692A;color:#fff;border:0;padding:11px 22px;border-radius:999px;font-weight:700;cursor:pointer;font-size:14px;}
.done{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#D4692A;}
.viewer-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); font-size:13px; text-align:center; z-index:2; }
  .viewer-loading.is-done { opacity:0; transition:opacity .4s ease; pointer-events:none; }
  .vl-badge { position:relative; width:76px; height:76px; display:flex; align-items:center; justify-content:center; }
  .vl-badge::before { content:""; position:absolute; inset:0; border-radius:50%; border:2px solid rgba(212,105,42,.16); }
  .vl-badge::after { content:""; position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top-color:#D4692A; border-right-color:#F0923A; animation:vl-spin 1.1s linear infinite; }
  .vl-badge img { width:44px; height:44px; object-fit:contain; animation:vl-pulse 1.6s ease-in-out infinite; }
  .vl-txt { font-size:12px; letter-spacing:.04em; animation:vl-fade 1.6s ease-in-out infinite; }
  @keyframes vl-spin { to { transform:rotate(360deg); } }
  @keyframes vl-pulse { 0%,100% { transform:scale(1); opacity:.85; } 50% { transform:scale(1.09); opacity:1; } }
  @keyframes vl-fade { 0%,100% { opacity:.5; } 50% { opacity:1; } }
  @media (prefers-reduced-motion:reduce) { .vl-badge::after, .vl-badge img, .vl-txt { animation:none; } }
</style>
