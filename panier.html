<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre panier — Doovlab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --sunset:#D4692A; --sunset-light:#F0923A; --sunset-dark:#A84E1A; --beige:#FDF6EE; --beige-dark:#F0E6D6; --text:#2C1A0E; --muted:#9A7A60; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; background:var(--beige); color:var(--text); }
  nav { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--beige-dark); }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-brand { font-family:'Playfair Display',serif; font-weight:700; font-size:20px; color:var(--text); letter-spacing:2px; }
  .back-link { font-size:14px; color:var(--muted); text-decoration:none; font-weight:600; }
  .back-link:hover { color:var(--sunset); }
  .wrap { max-width:720px; margin:0 auto; padding:32px 20px 60px; }
  h1 { font-family:'Playfair Display',serif; font-size:34px; margin-bottom:6px; }
  .sub { color:var(--muted); margin-bottom:28px; }
  .item { background:#fff; border:1px solid var(--beige-dark); border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start; margin-bottom:14px; box-shadow:0 6px 16px rgba(44,26,14,.05); }
  .item-body { flex:1; }
  .item-name { font-weight:700; font-size:16px; }
  .item-opts { font-size:13px; color:var(--muted); margin-top:4px; line-height:1.5; }
  .item-price { font-weight:700; white-space:nowrap; }
  .qty { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .qty button { width:30px; height:30px; border-radius:8px; border:1px solid var(--beige-dark); background:var(--beige); font-size:16px; cursor:pointer; color:var(--text); line-height:1; }
  .qty button:hover { border-color:var(--sunset); color:var(--sunset); }
  .qty span { min-width:22px; text-align:center; font-weight:700; }
  .remove { display:block; background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; text-decoration:underline; margin-top:8px; padding:0; }
  .remove:hover { color:#C0392B; }
  .ship-bar-wrap { background:#fff; border:1px solid var(--beige-dark); border-radius:14px; padding:16px; margin:8px 0 22px; }
  .ship-msg { font-size:14px; font-weight:600; margin-bottom:10px; }
  .ship-track { height:8px; background:var(--beige-dark); border-radius:99px; overflow:hidden; }
  .ship-fill { height:100%; background:linear-gradient(90deg,var(--sunset),var(--sunset-light)); width:0; transition:width .3s; }
  .summary { background:#fff; border:1px solid var(--beige-dark); border-radius:16px; padding:20px; }
  .row { display:flex; justify-content:space-between; margin-bottom:10px; font-size:15px; }
  .row.total { font-size:19px; font-weight:700; border-top:1px solid var(--beige-dark); padding-top:14px; margin-top:14px; margin-bottom:0; }
  .pay-btn { width:100%; margin-top:18px; background:var(--sunset); color:#fff; border:none; border-radius:12px; padding:16px; font-size:17px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; }
  .pay-btn:hover { background:var(--sunset-dark); }
  .pay-btn:disabled { background:var(--muted); cursor:not-allowed; }
  .note { text-align:center; font-size:12px; color:var(--muted); margin-top:12px; }
  .empty { text-align:center; padding:60px 0; }
  .empty p { color:var(--muted); margin-bottom:20px; font-size:17px; }
  .btn-shop { display:inline-block; background:var(--sunset); color:#fff; text-decoration:none; padding:13px 26px; border-radius:12px; font-weight:700; }
  .btn-shop:hover { background:var(--sunset-dark); }
  .err { background:#fdecea; border:1px solid #f0b6ae; color:#a02617; border-radius:10px; padding:12px; font-size:14px; margin-top:14px; display:none; }
  .cont { display:inline-block; margin-top:18px; color:var(--muted); text-decoration:none; font-weight:600; }
  .cont:hover { color:var(--sunset); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><span style="font-size:22px">🐾</span><span class="nav-brand">DOOVLAB</span></a>
  <a href="boutique.html" class="back-link">← Boutique</a>
</nav>

<div class="wrap">
  <h1>Votre panier</h1>
  <p class="sub">Livraison offerte dès 50€ d'achat.</p>
  <div id="cart-content"></div>
</div>

<script>
const KEY = 'doovlab_cart_v1';
const SHIPPING_FEE = 4.90;   // ⚠️ doit correspondre à SHIPPING_FEE_CENTS dans api/checkout.js (490 = 4,90 €)
const FREE_THRESHOLD = 50;

function getCart(){ try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
function saveCart(c){ localStorage.setItem(KEY, JSON.stringify(c)); }
function eur(n){ return n.toFixed(2).replace('.', ',') + ' €'; }

function render(){
  const cart = getCart();
  const root = document.getElementById('cart-content');

  if (!cart.length){
    root.innerHTML = '<div class="empty"><p>Votre panier est vide.</p><a class="btn-shop" href="boutique.html">Voir la boutique</a></div>';
    return;
  }

  let subtotal = 0;
  let html = '';
  cart.forEach((it, i) => {
    const line = it.price * it.qty;
    subtotal += line;
    html += '<div class="item">'
      + '<div class="item-body">'
        + '<div class="item-name">' + it.name + '</div>'
        + (it.options ? '<div class="item-opts">' + it.options + '</div>' : '')
        + '<div class="qty"><button onclick="chQty(' + i + ',-1)">−</button><span>' + it.qty + '</span><button onclick="chQty(' + i + ',1)">+</button></div>'
        + '<button class="remove" onclick="rm(' + i + ')">Retirer</button>'
      + '</div>'
      + '<div class="item-price">' + eur(line) + '</div>'
    + '</div>';
  });

  const remaining = Math.max(0, FREE_THRESHOLD - subtotal);
  const pct = Math.min(100, (subtotal / FREE_THRESHOLD) * 100);
  const shipMsg = remaining > 0
    ? 'Plus que <strong>' + eur(remaining) + '</strong> pour la livraison offerte 🎁'
    : '🎉 Vous avez la livraison offerte !';
  html += '<div class="ship-bar-wrap"><div class="ship-msg">' + shipMsg + '</div>'
        + '<div class="ship-track"><div class="ship-fill" style="width:' + pct + '%"></div></div></div>';

  const shipping = subtotal >= FREE_THRESHOLD ? 0 : SHIPPING_FEE;
  const total = subtotal + shipping;
  html += '<div class="summary">'
    + '<div class="row"><span>Sous-total</span><span>' + eur(subtotal) + '</span></div>'
    + '<div class="row"><span>Livraison</span><span>' + (shipping === 0 ? 'Offerte' : eur(shipping)) + '</span></div>'
    + '<div class="row total"><span>Total</span><span>' + eur(total) + '</span></div>'
    + '<button class="pay-btn" id="pay-btn" onclick="checkout()">Commander et payer</button>'
    + '<div class="err" id="err"></div>'
    + '<p class="note">Paiement 100% sécurisé via Stripe · Adresse de livraison demandée juste après</p>'
  + '</div>'
  + '<a class="cont" href="boutique.html">← Continuer mes achats</a>';

  root.innerHTML = html;
}

function chQty(i, d){
  const cart = getCart();
  if (!cart[i]) return;
  cart[i].qty = Math.max(1, Math.min(20, (cart[i].qty || 1) + d));
  saveCart(cart);
  render();
}

function rm(i){
  const cart = getCart();
  cart.splice(i, 1);
  saveCart(cart);
  render();
}

async function checkout(){
  const cart = getCart();
  if (!cart.length) return;
  const btn = document.getElementById('pay-btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Redirection vers le paiement…';
  try {
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cart.map(it => ({ id: it.id, qty: it.qty, options: it.options })) })
    });
    const data = await res.json();
    if (res.ok && data.url) { window.location.href = data.url; return; }
    throw new Error(data.error || 'Erreur inconnue');
  } catch(e) {
    err.textContent = 'Impossible de lancer le paiement : ' + e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Commander et payer';
  }
}

render();
</script>
</body>
</html>
