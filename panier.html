<html lang="fr">
<head>
<meta charset="utf-8">

<title>Votre panier — Doovlab</title>
  <meta name="description" content="Votre panier Doovlab : finalisez votre commande de médaillons pour chien en toute sécurité.">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Doovlab">
  <meta property="og:title" content="Votre panier — Doovlab">
  <meta property="og:description" content="Votre panier Doovlab : finalisez votre commande de médaillons pour chien en toute sécurité.">
  <meta property="og:image" content="https://doovlab.fr/og-image.jpg">
  <meta property="og:url" content="https://doovlab.fr/panier.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --sunset:#D4692A; --sunset-light:#F0923A; --sunset-dark:#A84E1A; --beige:#FDF6EE; --beige-dark:#F0E6D6; --text:#2C1A0E; --muted:#9A7A60; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; background:var(--beige); color:var(--text); }

  /* --- Navigation (identique au reste du site) --- */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 48px; background:rgba(253,246,238,0.94);
    backdrop-filter:blur(8px); border-bottom:1px solid rgba(212,105,42,0.12);
    transition:box-shadow .3s ease;
  }
  nav.scrolled { box-shadow:0 6px 24px -10px rgba(60,30,10,0.20); }
  .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .nav-logo img { width:36px; height:36px; object-fit:contain; }
  .nav-brand { font-family:'Playfair Display',serif; font-weight:700; font-size:20px; color:var(--text); letter-spacing:2px; }
  .nav-links { display:flex; align-items:center; gap:32px; list-style:none; }
  .nav-links a { text-decoration:none; font-size:14px; font-weight:600; color:var(--muted); letter-spacing:1px; text-transform:uppercase; transition:color .2s; }
  .nav-links a:hover, .nav-links a.active { color:var(--sunset); }
  .nav-cta { background:var(--sunset); color:var(--beige) !important; padding:10px 24px; border-radius:50px; transition:background .2s !important; }
  .nav-cta:hover { background:var(--sunset-dark) !important; color:var(--beige) !important; }

  .wrap { max-width:720px; margin:0 auto; padding:120px 20px 70px; }
  h1 { font-family:'Playfair Display',serif; font-size:34px; margin-bottom:6px; }
  .sub { color:var(--muted); margin-bottom:28px; }
  .item { background:#fff; border:1px solid var(--beige-dark); border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start; margin-bottom:14px; box-shadow:0 6px 16px rgba(44,26,14,.05); }
  .item-body { flex:1; }
  .item-name { font-weight:700; font-size:16px; }
  .item-opts { font-size:13px; color:var(--muted); margin-top:4px; line-height:1.5; }
  .item-price { font-weight:700; white-space:nowrap; }
  .qty { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .qty button { width:30px; height:30px; border-radius:8px; border:1px solid var(--beige-dark); background:var(--beige); font-size:16px; cursor:pointer; color:var(--text); line-height:1; }
  .qty button:hover { border-color:var(--sunset); color:var(--sunset); }
  .qty span { min-width:22px; text-align:center; font-weight:700; }
  .remove { display:block; background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; text-decoration:underline; margin-top:8px; padding:0; }
  .remove:hover { color:#C0392B; }
  .ship-bar-wrap { background:#fff; border:1px solid var(--beige-dark); border-radius:14px; padding:16px; margin:8px 0 14px; }
  .ship-msg { font-size:14px; font-weight:700; margin-bottom:10px; }
  .ship-track { height:10px; background:var(--beige-dark); border-radius:99px; overflow:hidden; }
  .ship-fill { height:100%; background:linear-gradient(90deg,var(--sunset),var(--sunset-light)); width:0; border-radius:99px; transition:width .45s cubic-bezier(.4,0,.2,1); }
  .nudge { background:linear-gradient(135deg,#FFF3E8,#FDEBD9); border:1px dashed var(--sunset-light); border-radius:14px; padding:14px 16px; margin-bottom:22px; font-size:14px; }
  .nudge a { color:var(--sunset-dark); font-weight:700; text-decoration:none; white-space:nowrap; }
  .nudge a:hover { text-decoration:underline; }
  .summary { background:#fff; border:1px solid var(--beige-dark); border-radius:16px; padding:20px; }
  .row { display:flex; justify-content:space-between; margin-bottom:10px; font-size:15px; }
  .row .free { color:#2D7a3a; font-weight:700; }
  .row.total { font-size:19px; font-weight:700; border-top:1px solid var(--beige-dark); padding-top:14px; margin-top:14px; margin-bottom:0; }
  .pay-btn { width:100%; margin-top:18px; background:var(--sunset); color:#fff; border:none; border-radius:12px; padding:16px; font-size:17px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; }
  .pay-btn:hover { background:var(--sunset-dark); }
  .pay-btn:disabled { background:var(--muted); cursor:not-allowed; }
  .note { text-align:center; font-size:12px; color:var(--muted); margin-top:12px; }
  .cgv-accept { display:flex; gap:10px; align-items:flex-start; margin-top:16px; font-size:13px; color:var(--text); line-height:1.5; text-align:left; }
  .cgv-accept input { margin-top:3px; flex:none; width:18px; height:18px; accent-color:var(--sunset); cursor:pointer; }
  .cgv-accept a { color:var(--sunset-dark); font-weight:700; }
  .badges { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-top:20px; font-size:12.5px; color:var(--muted); }
  .empty { text-align:center; padding:60px 0; }
  .empty p { color:var(--muted); margin-bottom:20px; font-size:17px; }
  .btn-shop { display:inline-block; background:var(--sunset); color:#fff; text-decoration:none; padding:13px 26px; border-radius:12px; font-weight:700; }
  .btn-shop:hover { background:var(--sunset-dark); }
  .err { background:#fdecea; border:1px solid #f0b6ae; color:#a02617; border-radius:10px; padding:12px; font-size:14px; margin-top:14px; display:none; }
  .cont { display:inline-block; margin-top:18px; color:var(--muted); text-decoration:none; font-weight:600; }
  .cont:hover { color:var(--sunset); }

  @media (max-width:760px){
    nav { padding:14px 20px; }
    .nav-links { display:none; }
    .wrap { padding-top:96px; }
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="Doovlab">
    <span class="nav-brand">DOOVLAB</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="boutique.html">Boutique</a></li>
    <li><a href="a-propos.html">Notre histoire</a></li>
    <li><a href="panier.html" id="nav-cart" class="active">🛒 Panier</a></li>
    <li><a href="contact.html" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<div class="wrap">
  <h1>Votre panier</h1>
  <p class="sub">Livraison offerte dès 50€ d'achat.</p>
  <div id="cart-content"></div>
</div>

<script>
const KEY = 'doovlab_cart_v1';
const SHIPPING_FEE = 4.90;   // ⚠️ doit correspondre à SHIPPING_FEE_CENTS dans api/checkout.js (490 = 4,90 €)
const FREE_THRESHOLD = 50;

function getCart(){ try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ return []; } }
function saveCart(c){ localStorage.setItem(KEY, JSON.stringify(c)); }
function eur(n){ return n.toFixed(2).replace('.', ',') + ' €'; }

function render(){
  const cart = getCart();
  const root = document.getElementById('cart-content');

  if (!cart.length){
    root.innerHTML = '<div class="empty"><p>Votre panier est vide.</p><a class="btn-shop" href="boutique.html">Voir la boutique</a></div>';
    updateNavCount();
    return;
  }

  let subtotal = 0;
  let html = '';
  cart.forEach((it, i) => {
    const line = it.price * it.qty;
    subtotal += line;
    html += '<div class="item">'
      + '<div class="item-body">'
        + '<div class="item-name">' + it.name + '</div>'
        + (it.options ? '<div class="item-opts">' + it.options + '</div>' : '')
        + '<div class="qty"><button onclick="chQty(' + i + ',-1)">−</button><span>' + it.qty + '</span><button onclick="chQty(' + i + ',1)">+</button></div>'
        + '<button class="remove" onclick="rm(' + i + ')">Retirer</button>'
      + '</div>'
      + '<div class="item-price">' + eur(line) + '</div>'
    + '</div>';
  });

  const remaining = Math.max(0, FREE_THRESHOLD - subtotal);
  const pct = Math.min(100, (subtotal / FREE_THRESHOLD) * 100);
  const freeReached = subtotal >= FREE_THRESHOLD;

  const shipMsg = freeReached
    ? '🎉 Bravo, la livraison est offerte ! <span style="color:#2D7a3a">Tu économises ' + eur(SHIPPING_FEE) + '</span>'
    : 'Plus que <strong>' + eur(remaining) + '</strong> pour la livraison offerte 🎁';
  html += '<div class="ship-bar-wrap"><div class="ship-msg">' + shipMsg + '</div>'
        + '<div class="ship-track"><div class="ship-fill" style="width:' + pct + '%"></div></div></div>';

  if (!freeReached){
    if (remaining <= 14){
      html += '<div class="nudge">Un <strong>médaillon Classique à 14€</strong> et la livraison passe offerte 😉 '
            + '<a href="commander-classique.html">Ajouter un Classique →</a></div>';
    } else {
      html += '<div class="nudge">Il te manque <strong>' + eur(remaining) + '</strong> pour la livraison offerte. '
            + '<a href="boutique.html">Compléter ma commande →</a></div>';
    }
  }

  const shipping = freeReached ? 0 : SHIPPING_FEE;
  const total = subtotal + shipping;
  html += '<div class="summary">'
    + '<div class="row"><span>Sous-total</span><span>' + eur(subtotal) + '</span></div>'
    + '<div class="row"><span>Livraison</span>' + (shipping === 0 ? '<span class="free">Offerte</span>' : '<span>' + eur(shipping) + '</span>') + '</div>'
    + '<div class="row total"><span>Total</span><span>' + eur(total) + '</span></div>'
    + '<label class="cgv-accept"><input type="checkbox" id="cgv-accept"><span>Je comprends que les médaillons sont fabriqués sur mesure (gravure, couleurs, puce NFC) et qu\'ils ne sont donc ni repris ni remboursés, sauf produit défectueux ou non conforme. J\'ai lu et j\'accepte les <a href="cgv.html" target="_blank" rel="noopener">Conditions Générales de Vente</a>.</span></label>'
    + '<button class="pay-btn" id="pay-btn" onclick="checkout()">Commander et payer</button>'
    + '<div class="err" id="err"></div>'
    + '<p class="note">Paiement 100% sécurisé via Stripe · Adresse de livraison demandée juste après</p>'
    + '<div class="badges"><span>🇫🇷 Fabriqué en France</span><span>🔒 Paiement sécurisé</span><span>♻️ PLA écologique</span></div>'
  + '</div>'
  + '<a class="cont" href="boutique.html">← Continuer mes achats</a>';

  root.innerHTML = html;
  updateNavCount();

  if (freeReached && !window.__celebrated){
    window.__celebrated = true;
    setTimeout(fireConfetti, 150);
  }
  if (!freeReached){ window.__celebrated = false; }
}

function updateNavCount(){
  try {
    var c = getCart();
    var el = document.getElementById('nav-cart');
    if (el) el.textContent = '🛒 Panier' + (c.length ? ' (' + c.length + ')' : '');
  } catch(e){}
}

function chQty(i, d){
  const cart = getCart();
  if (!cart[i]) return;
  cart[i].qty = Math.max(1, Math.min(20, (cart[i].qty || 1) + d));
  saveCart(cart);
  render();
}

function rm(i){
  const cart = getCart();
  cart.splice(i, 1);
  saveCart(cart);
  render();
}

async function checkout(){
  const cart = getCart();
  if (!cart.length) return;
  const btn = document.getElementById('pay-btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  const accept = document.getElementById('cgv-accept');
  if (!accept || !accept.checked){
    err.textContent = 'Merci de cocher la case pour accepter les conditions avant de payer.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Redirection vers le paiement…';
  try {
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cart.map(it => ({ id: it.id, qty: it.qty, options: it.options })) })
    });
    const data = await res.json();
    if (res.ok && data.url) { window.location.href = data.url; return; }
    throw new Error(data.error || 'Erreur inconnue');
  } catch(e) {
    err.textContent = 'Impossible de lancer le paiement : ' + e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Commander et payer';
  }
}

// Petit feu d'artifice maison (sans librairie externe)
function fireConfetti(){
  const c = document.createElement('canvas');
  c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  document.body.appendChild(c);
  const ctx = c.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  c.width = innerWidth * dpr; c.height = innerHeight * dpr; ctx.scale(dpr, dpr);
  const colors = ['#D4692A','#F0923A','#2D5A27','#E8C020','#4A90D9','#C0392B','#9B7FD4'];
  const parts = [];
  for (let i = 0; i < 130; i++){
    parts.push({ x: Math.random()*innerWidth, y: -20 - Math.random()*innerHeight*0.4, r: 4+Math.random()*6,
      col: colors[(Math.random()*colors.length)|0], vx:(Math.random()-0.5)*3, vy:2+Math.random()*4,
      rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.3 });
  }
  let start = null;
  function frame(t){
    if (!start) start = t;
    const el = t - start;
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, 1 - el / 2400);
      ctx.fillStyle = p.col;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
      ctx.restore();
    });
    if (el < 2400) requestAnimationFrame(frame);
    else c.remove();
  }
  requestAnimationFrame(frame);
}

// Ombre de la nav au scroll (comme les autres pages)
window.addEventListener('scroll', function(){
  var n = document.querySelector('nav');
  if (n) n.classList.toggle('scrolled', window.scrollY > 10);
});

render();
</script>
</body>
</html>
